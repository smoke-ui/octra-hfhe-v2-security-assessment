<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
<title id="title">OCTRA HFHE v2 confidentiality threat model</title><desc id="desc">Plaintext is split through a fresh additive mask into two independently multiplicatively masked layers before public edge serialization.</desc>
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="1"/></pattern><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#94a3b8"/></marker><style>text{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;fill:#e2e8f0}.h{font-size:22px;font-weight:700}.t{font-size:15px}.s{font-size:12px;fill:#94a3b8}.box{fill:#0f172a;stroke-width:2;rx:10}.flow{fill:none;stroke:#94a3b8;stroke-width:2;marker-end:url(#arrow)}.secret{stroke:#fb7185}.public{stroke:#22d3ee}.mask{stroke:#a78bfa}.safe{stroke:#34d399}</style></defs>
<rect width="1200" height="650" fill="#020617"/><rect width="1200" height="650" fill="url(#grid)"/><text x="48" y="48" class="h">OCTRA HFHE v2 — confidentiality boundary</text><text x="48" y="75" class="s">Two independent multiplicative masks + one fresh additive wrapper</text>
<path class="flow" d="M190 200H300"/><path class="flow" d="M430 200H540"/><path class="flow" d="M430 200C480 200 480 390 540 390"/><path class="flow" d="M690 200H800"/><path class="flow" d="M690 390H800"/><path class="flow" d="M950 200C1010 200 1010 290 1050 290"/><path class="flow" d="M950 390C1010 390 1010 310 1050 310"/>
<rect x="50" y="155" width="140" height="90" class="box secret"/><text x="84" y="193" class="t">plaintext v</text><text x="71" y="218" class="s">protected asset</text>
<rect x="300" y="145" width="130" height="110" class="box mask"/><text x="338" y="185" class="t">fresh m</text><text x="323" y="212" class="s">OS CSPRNG field</text><text x="330" y="232" class="s">v+m and -m</text>
<rect x="540" y="145" width="150" height="110" class="box mask"/><text x="570" y="183" class="t">layer 0</text><text x="557" y="210" class="s">R0 × (v + m)</text><text x="560" y="231" class="s">independent R0</text>
<rect x="540" y="335" width="150" height="110" class="box mask"/><text x="570" y="373" class="t">layer 1</text><text x="575" y="400" class="s">R1 × (-m)</text><text x="560" y="421" class="s">independent R1</text>
<rect x="800" y="145" width="150" height="110" class="box public"/><text x="825" y="183" class="t">public edges</text><text x="824" y="210" class="s">weights / sigma</text><text x="824" y="231" class="s">blinded PC0</text>
<rect x="800" y="335" width="150" height="110" class="box public"/><text x="825" y="373" class="t">public edges</text><text x="824" y="400" class="s">weights / sigma</text><text x="824" y="421" class="s">blinded PC1</text>
<rect x="1050" y="250" width="110" height="100" class="box safe"/><text x="1066" y="292" class="t">secret.ct</text><text x="1065" y="319" class="s">public wire</text>
<rect x="50" y="520" width="1110" height="80" class="box safe"/><text x="72" y="550" class="t">Attack blockers</text><text x="72" y="578" class="s">no R_com oracle  •  independent R0/R1  •  unknown Pedersen blindings  •  no exposed LPN samples  •  no nonce reuse</text>
</svg>
