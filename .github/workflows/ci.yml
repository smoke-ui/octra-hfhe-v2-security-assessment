name: security-assessment-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt
      - name: Rust format and tests
        run: |
          cargo fmt --check --manifest-path tools/rust-wire-audit/Cargo.toml
          cargo test --manifest-path tools/rust-wire-audit/Cargo.toml
      - name: Python, shell, JSON, and whitespace checks
        run: |
          python3 -m compileall -q tools scripts
          bash -n scripts/*.sh
          python3 - <<'PY'
          import json, pathlib
          for p in list(pathlib.Path('results').glob('*.json')) + list(pathlib.Path('results').glob('*.sarif')):
              json.loads(p.read_text())
          PY
          python3 -m venv /tmp/sarif-validator
          /tmp/sarif-validator/bin/pip install --quiet check-jsonschema==0.37.4
          /tmp/sarif-validator/bin/check-jsonschema \
            --schemafile https://json.schemastore.org/sarif-2.1.0.json \
            results/findings.sarif
          git show --check --format= HEAD
      - name: Secret-pattern guard
        run: python3 scripts/secret-scan.py

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ python3-venv
      - name: Pin upstream artifacts
        run: ./scripts/setup.sh
      - name: Verify published artifacts
        run: ./scripts/verify-artifacts.sh
      - name: Compile and run safe experiments
        run: ./scripts/run-all.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: assessment-results
          path: results/latest/
